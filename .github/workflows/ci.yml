name: CI

on:
  pull_request:
  # Required checks must also run on the merge queue's batched commit,
  # or the queue waits forever for a check that never starts.
  merge_group:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --max-warnings=0
      - run: pnpm build
