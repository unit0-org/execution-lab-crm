name: Deploy to Cloud Run

# Continuous deployment: on every merge to main, build → migrate → deploy.
# The image is built and pushed straight from this runner (no
# `gcloud builds submit` round-trip — that upload+queue cost ~40s), with a
# registry-backed BuildKit layer cache so unchanged deps aren't reinstalled.
# Auth is keyless via Workload Identity Federation — no service-account keys
# stored in GitHub. One-time GCP setup (grants github-deployer the roles this
# needs): scripts/setup-cd.sh. cloudbuild.yaml stays as the manual fallback.

on:
  push:
    branches: [main]
    # Docs-only pushes don't change the running app — skip the deploy.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

# Never let two prod deploys overlap; let an in-flight one finish.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

env:
  PROJECT_ID: the-execution-lab-crm
  REGION: us-east1
  IMAGE: us-east5-docker.pkg.dev/the-execution-lab-crm/crm/app
  CACHE: us-east5-docker.pkg.dev/the-execution-lab-crm/crm/app:buildcache

jobs:
  # Coalesce a burst of merges into one deploy: after a short debounce,
  # bail if this commit is no longer the tip of main (a newer merge
  # superseded it). Merge-queue batching already collapses queued PRs into
  # one push; this also covers PRs merged directly, back-to-back.
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 30
          latest=$(gh api \
            repos/${{ github.repository }}/commits/main --jq .sha)
          if [ "$latest" = "${{ github.sha }}" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Superseded by $latest — skipping this deploy."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: the-execution-lab-crm
          workload_identity_provider: projects/551994562422/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@the-execution-lab-crm.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker us-east5-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Fetch build-time public config
        run: |
          for s in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY \
                   NEXT_PUBLIC_SITE_URL NEXT_PUBLIC_PORTAL_URL; do
            v=$(gcloud secrets versions access latest \
              --secret="$s" --project "$PROJECT_ID")
            echo "$s=$v" >> "$GITHUB_ENV"
          done

      - name: Build image (registry layer cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CACHE }}
          cache-to: type=registry,ref=${{ env.CACHE }},mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_PORTAL_URL=${{ env.NEXT_PUBLIC_PORTAL_URL }}

      - name: Migrate database
        run: |
          db=$(gcloud secrets versions access latest \
            --secret=SUPABASE_DB_URL --project "$PROJECT_ID")
          echo "::add-mask::$db"
          docker run --rm -e RUN_MIGRATIONS=true -e SUPABASE_DB_URL="$db" \
            ${{ env.IMAGE }}:${{ github.sha }} node scripts/migrate.mjs

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          secrets=$(gcloud secrets list --project "$PROJECT_ID" \
            --format='value(name)' | awk '{print $1"="$1":latest"}' \
            | paste -sd,)
          gcloud run deploy crm \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region "$REGION" --project "$PROJECT_ID" \
            --set-secrets="$secrets" \
            --port 8080 --min-instances 1 --allow-unauthenticated \
            --cpu-boost
