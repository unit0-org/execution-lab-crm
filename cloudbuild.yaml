# Full CD pipeline: build → migrate → deploy. Runs on merge to main (via the
# GitHub Actions workflow that calls `gcloud builds submit`) and is also the
# manual deploy command. NEXT_PUBLIC_* are injected from Secret Manager and
# baked into the client bundle; migrations run from inside the built image
# (never at image build) before the new revision is rolled out.
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$NEXT_PUBLIC_SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
          --build-arg NEXT_PUBLIC_SITE_URL="$$NEXT_PUBLIC_SITE_URL" \
          --build-arg NEXT_PUBLIC_PORTAL_URL="$$NEXT_PUBLIC_PORTAL_URL" \
          -t us-east5-docker.pkg.dev/$PROJECT_ID/crm/app:latest .
    secretEnv:
      - NEXT_PUBLIC_SUPABASE_URL
      - NEXT_PUBLIC_SUPABASE_ANON_KEY
      - NEXT_PUBLIC_SITE_URL
      - NEXT_PUBLIC_PORTAL_URL

  # Apply pending migrations from inside the freshly built image (has node,
  # pg, scripts/ and supabase/migrations/). Idempotent; gates the deploy.
  - id: migrate
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker run --rm \
          -e RUN_MIGRATIONS=true \
          -e SUPABASE_DB_URL="$$SUPABASE_DB_URL" \
          us-east5-docker.pkg.dev/$PROJECT_ID/crm/app:latest \
          node scripts/migrate.mjs
    secretEnv:
      - SUPABASE_DB_URL

  - id: push
    name: gcr.io/cloud-builders/docker
    args: [push, us-east5-docker.pkg.dev/$PROJECT_ID/crm/app:latest]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        SECRETS=$(gcloud secrets list --project $PROJECT_ID \
          --format='value(name)' | awk '{print $$1"="$$1":latest"}' | paste -sd,)
        gcloud run deploy crm \
          --image us-east5-docker.pkg.dev/$PROJECT_ID/crm/app:latest \
          --region us-east1 --project $PROJECT_ID \
          --set-secrets="$$SECRETS" \
          --port 8080 --min-instances 1 --allow-unauthenticated

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_URL/versions/latest
      env: NEXT_PUBLIC_SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SUPABASE_ANON_KEY/versions/latest
      env: NEXT_PUBLIC_SUPABASE_ANON_KEY
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_SITE_URL/versions/latest
      env: NEXT_PUBLIC_SITE_URL
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_PORTAL_URL/versions/latest
      env: NEXT_PUBLIC_PORTAL_URL
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_DB_URL/versions/latest
      env: SUPABASE_DB_URL

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
timeout: 1800s
